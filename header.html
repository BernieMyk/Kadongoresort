<!-- header.html - Kadongo Resort -->
<header id="main-header">
    <div class="header-container">
        <div class="logo">
            <a href="index.html">KADONGO<span>RESORT</span></a>
        </div>

        <nav class="navbar" id="main-nav">
            <ul class="nav-links">
               <li><a href="index.html" class="active">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="rooms.html">Rooms</a></li>
                <li><a href="amenities.html">Amenities</a></li>
                <li><a href="dining.html">Dining</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="location.html">Location</a></li>
                <li><a href="index.html">Get in Touch</a></li>
                <li><a href="booking.html" class="btn-book">Book Now</a></li>
            </ul>
        </nav>

        <div class="header-actions">
            <button id="theme-toggle" aria-label="Toggle Dark Mode" title="Toggle theme">
                <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
            <button class="hamburger" id="mobile-toggle" aria-label="Toggle Menu" aria-expanded="false" aria-controls="main-nav">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
        </div>
    </div>
</header>

<style>
    :root {
        --primary-color: #2c5f4d;
        --accent-color: #e67e22;
        --accent-hover: #d35400;
        --bg-color: #ffffff;
        --text-color: #333333;
        --header-bg: rgba(255, 255, 255, 0.98);
        --nav-hover: #f4f4f4;
        --shadow: 0 4px 20px rgba(0,0,0,0.08);
        --shadow-hover: 0 8px 30px rgba(0,0,0,0.12);
    }
    [data-theme="dark"] {
        --bg-color: #121212;
        --text-color: #e0e0e0;
        --header-bg: rgba(26, 37, 47, 0.98);
        --nav-hover: #2a3745;
    }
    #main-header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 10000;
        background: var(--header-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: var(--shadow);
        transition: all 0.3s ease;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    .header-container {
        max-width: 1280px;
        margin: 0 auto;
        padding: 0.9rem 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: relative;
        z-index: 10001;
    }
    .logo a {
        font-size: 1.45rem;
        font-weight: 800;
        text-decoration: none;
        color: var(--text-color);
        letter-spacing: 0.5px;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 4px;
    }
    .logo span { color: var(--primary-color); }
    .navbar { z-index: 9999; }
    .nav-links {
        display: flex;
        list-style: none;
        gap: 1.3rem;
        margin: 0;
        padding: 0;
        align-items: center;
    }
    .nav-links a {
        text-decoration: none;
        color: var(--text-color);
        font-weight: 500;
        font-size: 0.95rem;
        padding: 0.5rem 0.3rem;
        transition: color 0.25s ease;
        position: relative;
    }
    .nav-links a:hover,
    .nav-links a.active { color: var(--primary-color); }
    .nav-links a::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        width: 0;
        height: 2px;
        background: var(--primary-color);
        transition: all 0.3s ease;
        transform: translateX(-50%);
    }
    .nav-links a:hover::after,
    .nav-links a.active::after { width: 70%; }
    .btn-book {
        background: var(--primary-color);
        color: #fff !important;
        padding: 0.65rem 1.4rem;
        border-radius: 8px;
        font-weight: 600;
        transition: all 0.3s ease;
    }
    .btn-book:hover {
        background: var(--accent-color);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(230, 126, 34, 0.35);
    }
    .btn-book::after { display: none !important; }
    .header-actions {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        z-index: 10002;
    }
    #theme-toggle {
        background: transparent;
        border: none;
        cursor: pointer;
        color: var(--text-color);
        padding: 0.5rem;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.25s ease;
        touch-action: manipulation;
    }
    #theme-toggle:hover { background: var(--nav-hover); }
    .moon-icon { display: none; }
    [data-theme="dark"] .sun-icon { display: none; }
    [data-theme="dark"] .moon-icon { display: block; }
    .hamburger {
        display: none;
        flex-direction: column;
        gap: 5px;
        padding: 0.6rem;
        background: transparent;
        border: none;
        cursor: pointer;
        z-index: 10003;
        touch-action: manipulation;
        min-width: 44px;
        min-height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .bar {
        width: 26px;
        height: 3px;
        background: var(--text-color);
        border-radius: 2px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .hamburger.active .bar:nth-child(1) { transform: translateY(8px) rotate(45deg); }
    .hamburger.active .bar:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.active .bar:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }
    @media (max-width: 992px) {
        .hamburger { display: flex; }
        .navbar {
            position: fixed;
            top: 72px;
            left: 0;
            width: 100%;
            background: var(--header-bg);
            border-top: 1px solid rgba(0,0,0,0.08);
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out, opacity 0.3s ease;
            opacity: 0;
            z-index: 9998;
            box-shadow: var(--shadow-hover);
        }
        .navbar.active { max-height: 550px; opacity: 1; }
        .nav-links {
            flex-direction: column;
            padding: 1.2rem 1.5rem;
            gap: 0.5rem;
            background: var(--header-bg);
            align-items: stretch;
        }
        .nav-links li { width: 100%; text-align: center; }
        .nav-links a {
            display: block;
            padding: 0.9rem 1rem;
            border-radius: 8px;
            font-size: 1.05rem;
        }
        .nav-links a:hover { background: var(--nav-hover); }
        .btn-book { margin-top: 0.5rem; width: 100%; text-align: center; }
    }
    body { padding-top: 72px; }
    #particle-canvas { pointer-events: none !important; }
    @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
            animation-duration: 0.01ms !important;
            animation-iteration-count: 1 !important;
            transition-duration: 0.01ms !important;
        }
    }
    a:focus-visible, button:focus-visible {
        outline: 2px solid var(--accent-color);
        outline-offset: 2px;
        border-radius: 6px;
    }
</style>

<script>
(function initHeader() {
    'use strict';
    const hamburger = document.getElementById('mobile-toggle');
    const navbar = document.getElementById('main-nav');
    const themeToggle = document.getElementById('theme-toggle');
    const navLinks = document.querySelectorAll('.nav-links a');
    
    if (!hamburger || !navbar) {
        console.log('🔄 Header elements not ready, retrying in 100ms...');
        setTimeout(initHeader, 100);
        return;
    }
    console.log('✅ Header initialized');

    function toggleMenu() {
        const isActive = navbar.classList.toggle('active');
        hamburger.classList.toggle('active');
        hamburger.setAttribute('aria-expanded', isActive);
        if (window.innerWidth <= 992) {
            document.body.style.overflow = isActive ? 'hidden' : '';
        }
    }

    hamburger.addEventListener('click', toggleMenu);
    hamburger.addEventListener('touchstart', (e) => {
        e.preventDefault();
        toggleMenu();
    }, { passive: false });

    navLinks.forEach(link => {
        link.addEventListener('click', () => {
            if (window.innerWidth <= 992 && navbar.classList.contains('active')) {
                navbar.classList.remove('active');
                hamburger.classList.remove('active');
                hamburger.setAttribute('aria-expanded', 'false');
                document.body.style.overflow = '';
            }
        });
    });

    document.addEventListener('click', (e) => {
        if (window.innerWidth <= 992 && 
            navbar.classList.contains('active') && 
            !navbar.contains(e.target) && 
            !hamburger.contains(e.target)) {
            navbar.classList.remove('active');
            hamburger.classList.remove('active');
            hamburger.setAttribute('aria-expanded', 'false');
            document.body.style.overflow = '';
        }
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && navbar.classList.contains('active')) {
            navbar.classList.remove('active');
            hamburger.classList.remove('active');
            hamburger.setAttribute('aria-expanded', 'false');
            hamburger.focus();
        }
    });

    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
    }
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
        applyTheme(savedTheme);
    } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        applyTheme('dark');
    }
    if (themeToggle) {
        themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            applyTheme(current === 'dark' ? 'light' : 'dark');
        });
    }

    let lastScrollY = window.scrollY;
    window.addEventListener('scroll', () => {
        const header = document.getElementById('main-header');
        if (!header) return;
        if (window.scrollY > 50) {
            header.style.boxShadow = '0 6px 30px rgba(0,0,0,0.15)';
            header.style.background = getComputedStyle(document.documentElement)
                .getPropertyValue('--header-bg').trim() + 'ee';
        } else {
            header.style.boxShadow = 'var(--shadow)';
            header.style.background = getComputedStyle(document.documentElement)
                .getPropertyValue('--header-bg').trim();
        }
        lastScrollY = window.scrollY;
    }, { passive: true });

    window.addEventListener('resize', () => {
        if (window.innerWidth > 992 && navbar.classList.contains('active')) {
            navbar.classList.remove('active');
            hamburger.classList.remove('active');
            hamburger.setAttribute('aria-expanded', 'false');
            document.body.style.overflow = '';
        }
    });
})();
</script>
