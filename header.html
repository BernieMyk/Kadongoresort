<!-- 🔽 PREMIUM EXECUTIVE HEADER STYLES 🔽 -->
<style>
  /* ===== CORE RESET & TYPOGRAPHY ===== */
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI', system-ui, -apple-system, sans-serif;line-height:1.6;color:#2d3748;background:#fff}
  a{text-decoration:none;color:inherit;transition:all 0.3s cubic-bezier(0.4,0,0.2,1)}
  .container{max-width:1280px;margin:0 auto;padding:0 24px}
  
  /* ===== PREMIUM HEADER BASE ===== */
  header{
    background:linear-gradient(135deg, rgba(255,255,255,0.98) 0%, rgba(248,250,252,0.95) 100%);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    box-shadow:0 4px 20px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05);
    position:sticky;top:0;z-index:1000;
    transition:all 0.4s cubic-bezier(0.4,0,0.2,1);
    border-bottom:1px solid rgba(44,95,77,0.08);
  }
  header.scrolled{
    padding:8px 0;
    box-shadow:0 8px 30px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.08);
    background:rgba(255,255,255,0.99);
  }
  
  /* ===== TOP BAR (Optional Premium Touch) ===== */
  .top-bar{
    background:linear-gradient(90deg, #2c5f4d 0%, #3a7a63 100%);
    color:rgba(255,255,255,0.92);
    font-size:0.85rem;
    padding:6px 0;
    text-align:center;
    letter-spacing:0.3px;
  }
  .top-bar a{color:#fff;font-weight:500;border-bottom:1px dashed rgba(255,255,255,0.4)}
  .top-bar a:hover{border-bottom-color:#fff}
  
  /* ===== HEADER INNER LAYOUT ===== */
  .header-inner{
    display:flex;justify-content:space-between;align-items:center;
    padding:18px 0;transition:padding 0.3s ease;
  }
  header.scrolled .header-inner{padding:12px 0}
  
  /* ===== LOGO - PREMIUM TREATMENT ===== */
  .logo-wrapper{display:flex;align-items:center;gap:10px}
  header h1{
    font-size:1.65rem;font-weight:800;letter-spacing:-0.5px;
    background:linear-gradient(135deg, #2c5f4d 0%, #1a3a2f 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;position:relative;display:inline-block;
  }
  header h1::after{
    content:'';position:absolute;bottom:-4px;left:0;width:100%;height:2px;
    background:linear-gradient(90deg, transparent, #e67e22, transparent);
    opacity:0;transition:opacity 0.3s ease;border-radius:2px;
  }
  header h1:hover::after{opacity:1}
  header h1 span{
    background:linear-gradient(135deg, #e67e22 0%, #d35400 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  }
  .logo-badge{
    background:linear-gradient(135deg, #e67e22, #d35400);
    color:#fff;font-size:0.65rem;font-weight:700;padding:3px 8px;
    border-radius:20px;letter-spacing:0.5px;text-transform:uppercase;
    box-shadow:0 2px 8px rgba(230,126,34,0.35);
  }
  
  /* ===== NAVIGATION - EXECUTIVE STYLE ===== */
  header nav{display:flex;gap:4px}
  header nav a{
    position:relative;font-weight:600;font-size:0.95rem;
    padding:10px 14px;border-radius:8px;color:#4a5568;
    letter-spacing:0.2px;transition:all 0.25s ease;
  }
  header nav a::before{
    content:'';position:absolute;bottom:6px;left:50%;
    width:0;height:2px;background:linear-gradient(90deg, #2c5f4d, #e67e22);
    border-radius:2px;transition:all 0.3s ease;transform:translateX(-50%);
    opacity:0;
  }
  header nav a:hover,
  header nav a.active{
    color:#2c5f4d;background:rgba(44,95,77,0.06);
    transform:translateY(-1px);
  }
  header nav a:hover::before,
  header nav a.active::before{width:70%;opacity:1}
  header nav a.active{color:#e67e22;font-weight:700}
  
  /* ===== HEADER ACTIONS - PREMIUM BUTTON ===== */
  .header-actions{display:flex;align-items:center;gap:16px}
  .btn-book{
    position:relative;overflow:hidden;
    background:linear-gradient(135deg, #e67e22 0%, #d35400 100%);
    color:#fff;font-weight:700;padding:12px 28px;border-radius:50px;
    font-size:0.95rem;letter-spacing:0.3px;
    box-shadow:0 4px 14px rgba(230,126,34,0.35), 0 2px 4px rgba(0,0,0,0.08);
    transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
    display:flex;align-items:center;gap:8px;
  }
  .btn-book::before{
    content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    transition:left 0.5s ease;
  }
  .btn-book:hover{
    transform:translateY(-2px) scale(1.02);
    box-shadow:0 8px 25px rgba(230,126,34,0.45), 0 4px 8px rgba(0,0,0,0.12);
    color:#fff;
  }
  .btn-book:hover::before{left:100%}
  .btn-book:active{transform:translateY(0) scale(0.98)}
  
  /* ===== MOBILE TOGGLE - REFINED ===== */
  .mobile-toggle{
    display:none;font-size:1.4rem;cursor:pointer;
    background:rgba(44,95,77,0.08);border:none;border-radius:10px;
    width:44px;height:44px;color:#2c5f4d;
    transition:all 0.25s ease;display:flex;align-items:center;justify-content:center;
  }
  .mobile-toggle:hover{background:rgba(44,95,77,0.15);transform:scale(1.05)}
  .mobile-toggle:active{transform:scale(0.95)}
  
  /* ===== MOBILE MENU - PREMIUM DROPDOWN ===== */
  @media(max-width:992px){
    header nav{
      display:none;flex-direction:column;position:absolute;
      top:100%;left:0;right:0;background:rgba(255,255,255,0.98);
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      padding:20px 24px;box-shadow:0 12px 40px rgba(0,0,0,0.15);
      border-top:1px solid rgba(44,95,77,0.1);border-radius:0 0 16px 16px;
      gap:6px;animation:slideDown 0.3s ease;
    }
    @keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
    header nav.active{display:flex}
    header nav a{
      padding:14px 16px;border-radius:10px;font-size:1rem;
      border-left:3px solid transparent;transition:all 0.25s ease;
    }
    header nav a:hover,
    header nav a.active{
      background:rgba(44,95,77,0.08);
      border-left-color:#e67e22;color:#2c5f4d;
      transform:translateX(4px);
    }
    .mobile-toggle{display:flex}
    .header-actions .btn-book{padding:10px 22px;font-size:0.9rem}
  }
  
  /* ===== SUBTLE ENTRANCE ANIMATION ===== */
  @media(prefers-reduced-motion: no-preference){
    header{animation:headerEntrance 0.6s cubic-bezier(0.4,0,0.2,1) both}
    @keyframes headerEntrance{
      from{opacity:0;transform:translateY(-20px)}
      to{opacity:1;transform:translateY(0)}
    }
  }
  
  /* ===== ACCESSIBILITY & FOCUS STATES ===== */
  a:focus-visible, button:focus-visible{
    outline:2px solid #e67e22;outline-offset:2px;border-radius:6px;
  }
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
</style>

<!-- 🔽 ENHANCED JS: SCROLL EFFECTS + MOBILE MENU + ACTIVE LINKS 🔽 -->
<script>
  document.addEventListener('DOMContentLoaded', function() {
    // ===== Scroll Effect: Shrink Header on Scroll =====
    const header = document.querySelector('header');
    let lastScroll = 0;
    
    window.addEventListener('scroll', () => {
      const currentScroll = window.pageYOffset;
      
      // Add scrolled class for visual change
      if (currentScroll > 10) {
        header.classList.add('scrolled');
      } else {
        header.classList.remove('scrolled');
      }
      
      // Optional: Hide header on scroll down, show on scroll up (uncomment if desired)
      /*
      if (currentScroll <= 0) {
        header.classList.remove('scroll-up');
        return;
      }
      if (currentScroll > lastScroll && !header.classList.contains('scroll-down')) {
        header.classList.remove('scroll-up');
        header.classList.add('scroll-down');
      } else if (currentScroll < lastScroll && header.classList.contains('scroll-down')) {
        header.classList.remove('scroll-down');
        header.classList.add('scroll-up');
      }
      lastScroll = currentScroll;
      */
    }, { passive: true });
    
    // ===== Mobile Menu Toggle with Accessibility =====
    const toggle = document.getElementById('mobile-toggle');
    const nav = document.getElementById('main-nav');
    
    if(toggle && nav) {
      toggle.addEventListener('click', function() {
        const isExpanded = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', !isExpanded);
        nav.classList.toggle('active');
        this.innerHTML = isExpanded 
          ? '<span class="sr-only">Menu</span>☰' 
          : '<span class="sr-only">Close</span>✕';
        
        // Trap focus in mobile menu when open (basic implementation)
        if(!isExpanded) {
          const firstLink = nav.querySelector('a');
          if(firstLink) setTimeout(() => firstLink.focus(), 100);
        }
      });
      
      // Close menu when clicking a link (mobile)
      nav.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          if(window.innerWidth <= 992) {
            nav.classList.remove('active');
            toggle.setAttribute('aria-expanded', 'false');
            toggle.innerHTML = '<span class="sr-only">Menu</span>☰';
          }
        });
      });
    }
    
    // ===== Highlight Active Page with Fallback =====
    const currentPath = window.location.pathname;
    const currentPage = currentPath.split('/').pop() || 'index.html';
    
    document.querySelectorAll('.nav-link').forEach(link => {
      const linkHref = link.getAttribute('href');
      if(linkHref === currentPage || currentPath.includes(linkHref)) {
        link.classList.add('active');
      }
    });
    
    // ===== Smooth Scroll for Anchor Links (Optional) =====
  document.querySelectorAll('a[href*="#"]').forEach(anchor => {
  anchor.addEventListener('click', function(e) {
    const href = this.getAttribute('href');

    // Split URL and hash
    const [page, hash] = href.split('#');

    // If it's the same page OR just #footer
    if (!page || page === window.location.pathname.split('/').pop()) {
      const target = document.querySelector('#' + hash);
      if (target) {
        e.preventDefault();
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }
    // else → allow normal navigation to another page
  });
});
  });
</script>
